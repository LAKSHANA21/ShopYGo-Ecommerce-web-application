<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/header :: header}">
    <title>Login</title>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Login</h4>
                    </div>
                    <div class="card-body">
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="identifier" class="form-label">Email or Phone</label>
                                <input type="text" class="form-control" id="identifier" required>
                            </div>
                            <div class="mb-3" id="passwordSection" style="display:block;">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password">
                            </div>
                            <div class="mb-3" id="otpSection" style="display: none;">
                                <label for="otp" class="form-label">OTP</label>
                                <input type="text" class="form-control" id="otp">
                                <button type="button" class="btn btn-link p-0 mt-1" onclick="requestOTP()">Request OTP</button>
                            </div>
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="useOTP">
                                <label class="form-check-label" for="useOTP">Login with OTP</label>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Login</button>
                        </form>
                        <div class="mt-3 text-center">
                            <p>Don't have an account? <a href="/register">Register here</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{static/js/auth.js}"></script>
</body>
</html>
